{% extends 'base.html' %}
{% block content %}
<div class="form-card">
    <h2>Регистрация</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>ФИО</label>
            <input type="text" name="full_name" required>
        </div>
        <div class="form-group">
            <label>Логин</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn">Создать аккаунт</button>
    </form>
</div>
{% endblock %}
